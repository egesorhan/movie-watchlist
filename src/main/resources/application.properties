# ========================
# Server
# ========================
server.port=8080

# ========================
# MySQL Database
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/movie_watchlist?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# TMDB API
# ========================
tmdb.api.key=279fa70b3fd5047ef5ca373f3080ba49
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.image-base-url=https://image.tmdb.org/t/p
